syntax = "proto3";

import "common.proto";

option java_multiple_files = true;
option java_package = "Backend.demo.grpc";
option java_outer_classname = "TaskCategoryServiceProto";

service TaskCategoryService {
  rpc GetCategoryById (CategoryIdRequest) returns (CategoryResponse);
  rpc GetAllCategories (EmptyRequest) returns (CategoryListResponse);
  rpc CreateCategory (CreateCategoryRequest) returns (CategoryResponse);
  rpc UpdateCategory (UpdateCategoryRequest) returns (CategoryResponse);
  rpc DeleteCategory (CategoryIdRequest) returns (EmptyResponse);
}

message CategoryIdRequest {
  int32 id = 1;
}

message CategoryResponse {
  int32 id = 1;
  string categoryName = 2;
}

message CategoryListResponse {
  repeated CategoryResponse categories = 1;
}

message CreateCategoryRequest {
  string categoryName = 1;
}

message UpdateCategoryRequest {
  int32 id = 1;
  string categoryName = 2;
}