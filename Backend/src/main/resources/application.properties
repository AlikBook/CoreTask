spring.application.name=Backend

# Database configuration is now handled by TaskDatabaseConfig and WorkerDatabaseConfig Java classes
# Two separate H2 databases:
# - taskdb: for Tasks, TaskStatus, TaskCategory
# - workerdb: for Worker, UserInfo

# H2 Console
spring.h2.console.enabled=true

# JPA Settings
spring.jpa.hibernate.ddl-auto=update

# gRPC Server
grpc.server.port=9090
