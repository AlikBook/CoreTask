spring.application.name=api-gateway
server.port=${SERVER_PORT:8081}
spring.cloud.gateway.routes[0].id=backend
# Link to the backend


# Uncomment this line if you want to run the gateway without a docker container 
#spring.cloud.gateway.routes[0].uri=http://localhost:8080 

#Comment this line if you want to run the gateway without a docker container 
spring.cloud.gateway.routes[0].uri=${BACKEND_SERVICE_URL:http://backend:8080}
spring.cloud.gateway.routes[0].predicates[0]=Path=${API_PATH_PATTERN:/api/**}
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.globalcors.corsConfigurations.[/api/**].allowedOrigins=${FRONTEND_ORIGIN:http://localhost:5173}
spring.cloud.gateway.globalcors.corsConfigurations.[/api/**].allowedMethods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
spring.cloud.gateway.globalcors.corsConfigurations.[/api/**].allowedHeaders=*

